version: "3.9"

services:
  backend:
    build: .
    container_name: pinpoint-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./pinpoint.db
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
    volumes:
      - .:/app
    restart: unless-stopped
    entrypoint: /app/entrypoint.sh
